    <rect x="156" y="200" width="32" height="40" rx="3"/>
    <rect x="216" y="200" width="32" height="40" rx="3"/>
    <rect x="264" y="200" width="32" height="40" rx="3"/>
    <rect x="324" y="200" width="32" height="40" rx="3"/>

    <rect x="156" y="264" width="32" height="40" rx="3"/>
    <rect x="216" y="264" width="32" height="40" rx="3"/>
    <rect x="264" y="264" width="32" height="40" rx="3"/>
    <rect x="324" y="264" width="32" height="40" rx="3"/>

    <rect x="156" y="328" width="32" height="40" rx="3"/>
    <rect x="216" y="328" width="32" height="40" rx="3"/>
    <rect x="264" y="328" width="32" height="40" rx="3"/>
    <rect x="324" y="328" width="32" height="40" rx="3"/>
  </g>
  <!-- Entry door -->
  <rect x="232" y="392" width="48" height="56" rx="4" fill="#0F172A"/>
