<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Concierge — Offline</title>
    <style>
      :root {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #0f172a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        background: #ffffff;
      }
      .card {
        max-width: 360px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        display: block;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        margin: 0 0 8px;
        letter-spacing: -0.01em;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        color: #64748b;
        margin: 0 0 24px;
      }
      button {
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
        background: #0f172a;
        border: 0;
        padding: 12px 24px;
        border-radius: 12px;
        cursor: pointer;
        min-height: 44px;
      }
      button:hover {
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="icon" src="/icon.svg" alt="Concierge" />
      <h1>You're offline</h1>
      <p>Check your connection. Concierge keeps your data on our servers — once you're back online, everything will be here.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
